<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evirgen Test Sayfası</title>
<style>
  :root {
    --bg: #0d1420; --raised: #131c2b; --line: #22304a;
    --text: #cbd5e1; --dim: #64748b; --amber: #f5a623; --green: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: ui-monospace, 'JetBrains Mono', Consolas, monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 560px; background: var(--raised);
    border: 1px solid var(--line); border-radius: 10px; padding: 28px;
  }
  h1 { font-size: 13px; letter-spacing: 0.18em; color: var(--amber); margin-bottom: 20px; }
  .count { font-size: 72px; font-weight: 700; color: var(--amber);
           text-shadow: 0 0 24px rgba(245,166,35,.3); line-height: 1; }
  .count-label { color: var(--dim); font-size: 12px; margin: 6px 0 20px; }
  .meta { font-size: 12px; color: var(--dim); margin-bottom: 16px; }
  .meta b { color: var(--text); font-weight: 600; }
  ul { list-style: none; max-height: 260px; overflow-y: auto;
       border-top: 1px solid var(--line); }
  li { display: flex; gap: 12px; padding: 7px 2px; font-size: 12px;
       border-bottom: 1px solid var(--line); }
  li .n { color: var(--amber); width: 36px; flex-shrink: 0; }
  li .ts { color: var(--text); }
  li .delta { color: var(--green); margin-left: auto; }
  li.first .delta { color: var(--dim); }
  button {
    margin-top: 18px; background: none; border: 1px solid var(--line);
    color: var(--dim); border-radius: 6px; padding: 8px 16px;
    font-family: inherit; font-size: 12px; cursor: pointer;
  }
  button:hover { border-color: var(--amber); color: var(--amber); }
  .empty { padding: 14px 2px; color: var(--dim); font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>&#8635; EVİRGEN TEST</h1>
  <div class="count" id="count">0</div>
  <div class="count-label" id="countLabel">kez yenilendi</div>
  <div class="meta">Bu yükleme: <b id="now"></b></div>
  <ul id="log"><li class="empty">Henüz yenileme yok — eklentiyi bu sekmede başlat.</li></ul>
  <button id="reset">Sayacı sıfırla</button>
</div>
<script>
'use strict';
(() => {
  const KEY = 'evirgen-test-log';

  const read = () => {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch { return []; }
  };
  const write = (log) => localStorage.setItem(KEY, JSON.stringify(log));

  const fmt = (t) => new Date(t).toLocaleTimeString('tr-TR', {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  }) + '.' + String(new Date(t).getMilliseconds()).padStart(3, '0');

  // Record this load. navigation.type ayrımı yapmıyoruz: ilk açılış da
  // logda görünür, reload sayısı = kayıt sayısı - 1.
  const log = read();
  log.push(Date.now());
  if (log.length > 200) log.splice(0, log.length - 200); // cap
  write(log);

  const reloads = log.length - 1;
  document.getElementById('count').textContent = reloads;
  document.getElementById('countLabel').textContent =
    reloads === 0 ? 'henüz yenilenmedi (ilk yükleme)' : 'kez yenilendi';
  document.getElementById('now').textContent = fmt(log[log.length - 1]);

  const ul = document.getElementById('log');
  if (log.length > 1 || log.length === 1) {
    ul.innerHTML = '';
    // en yeni üstte
    for (let i = log.length - 1; i >= 0; i--) {
      const li = document.createElement('li');
      const n = document.createElement('span');
      n.className = 'n';
      n.textContent = i === 0 ? 'ilk' : '#' + i;
      const ts = document.createElement('span');
      ts.className = 'ts';
      ts.textContent = fmt(log[i]);
      const delta = document.createElement('span');
      delta.className = 'delta';
      if (i === 0) { li.classList.add('first'); delta.textContent = 'açılış'; }
      else delta.textContent = '+' + ((log[i] - log[i - 1]) / 1000).toFixed(1) + 's';
      li.append(n, ts, delta);
      ul.appendChild(li);
    }
  }

  document.getElementById('reset').addEventListener('click', () => {
    localStorage.removeItem(KEY);
    location.reload();
  });
})();
</script>
</body>
</html>
